name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for manual runs"
        required: false
        default: "latest"
      push:
        description: "Push to registries (uncheck to build only)"
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # One job per target. Each builds a multi-arch (amd64 + arm64) image and pushes
  # the manifest to both registries directly - build-push-action handles the
  # manifest list, so there is no digest/merge step. Runs sequentially (slim
  # first, full last) so `:latest` is the most-recently-pushed tag and shows as
  # the suggested pull command on the registry package page.
  publish:
    name: Publish ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target: [slim, full]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to the Container registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: |
            zzzteph/boxcutter
            ghcr.io/${{ github.repository }}
          flavor: ${{ matrix.target == 'slim' && 'suffix=-slim,onlatest=true' || '' }}
          # Only ever publish `latest` (and `latest-slim` for the slim target via
          # flavor) - no version/ref tags, regardless of the release version.
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

      - name: Inspect manifest
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        run: |
          tag=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$tag"
