name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for manual test runs (latest is left untouched)"
        required: false
        default: "dev"
      push:
        description: "Push to registries (uncheck to build only)"
        type: boolean
        default: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # One job per target x architecture (4 jobs, in parallel). Each builds a
  # single-arch image and pushes it *by digest* (no tag yet) to both registries;
  # the merge job then assembles the tagged manifest lists.
  build:
    name: Build ${{ matrix.target }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [full, slim]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          # arm64 native runner (free on public repos). For a private repo,
          # switch this to `ubuntu-latest` to fall back to QEMU emulation.
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Normalize platform name
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to the Container registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Labels for the image
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: |
            zzzteph/boxcutter
            ghcr.io/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            type=image,name=zzzteph/boxcutter,push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'workflow_dispatch' || inputs.push }}
            type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.target }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # One merge job per target. Collects that target's per-arch digests and
  # publishes a single multi-arch manifest list per tag, to both registries.
  merge:
    name: Merge ${{ matrix.target }} manifest
    needs: build
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: [full, slim]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to the Container registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: |
            zzzteph/boxcutter
            ghcr.io/${{ github.repository }}
          flavor: ${{ matrix.target == 'slim' && 'suffix=-slim,onlatest=true' || '' }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create and push manifest lists
        working-directory: /tmp/digests
        run: |
          # Each registry already holds the per-arch blobs (build pushed to both),
          # so assemble each manifest from its own registry - no cross-registry copy.
          for image in zzzteph/boxcutter "ghcr.io/${{ github.repository }}"; do
            tags=$(jq -cr --arg img "$image" \
              '.tags | map(select(startswith($img + ":"))) | map("-t " + .) | join(" ")' \
              <<< "$DOCKER_METADATA_OUTPUT_JSON")
            sources=$(printf "${image}@sha256:%s " *)
            echo "::group::$image"
            docker buildx imagetools create $tags $sources
            echo "::endgroup::"
          done

      - name: Inspect
        run: |
          tag=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$tag"
