name: secrets-scan
help: gather JS files (web-crawl + wayback, filtered to JS), scan each for secrets
input: target
output: findings

steps:
  - workflow: web-crawl
    target: ${target | url}
    save: crawled
  - select: ${crawled | js}
    save: js
  - tool: wayback
    target: ${target | hosts}
    save: archived
  - select: ${archived | js}
    save: js

  - for_each: ${js}
    do:
      - tool: scan-secrets
        target: ${js.item}
        save: findings
