name: env-wayback-secrets
help: subfinder, then secrets-scan (web-crawl + wayback -> scan-secrets) on every subdomain
input: target
output: findings

steps:
  - tool: subfinder
    target: ${target}
    save: hosts

  - for_each: ${hosts}
    do:
      - workflow: secrets-scan
        target: ${hosts.item}
        save: findings