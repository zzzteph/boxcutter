name: env-wayback
help: subfinder, wayback every subdomain, then web-dast every parameterised URL (deduped)
input: target
output: findings

steps:
  - tool: subfinder
    target: ${target}
    save: hosts

  - for_each: ${hosts}
    do:
      - tool: wayback
        target: ${hosts.item}
        save: urls

  - select: ${urls | params | dedup}
    save: params

  - for_each: ${params}
    do:
      - workflow: web-dast
        target: ${params.item}
        save: findings