name: secrets-hunter
help: gather JS files (url-crawl --js + wayback), scan each for secrets
input: target
output: findings

steps:
  - tool: url-crawl
    target: ${target | url}
    args: --js
    save: js
  - tool: wayback
    target: ${target | hosts}
    save: archived
  - select: ${archived | js}
    save: js

  - for_each: ${js}
    do:
      - tool: scan-secrets
        target: ${js.item}
        save: findings
