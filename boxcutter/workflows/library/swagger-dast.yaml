name: swagger-dast
help: run the DAST bundle against every Swagger endpoint (fuzz + nuclei-dast + sqlmap + zap)
input: spec
output: findings

steps:
  - tool: swagger-endpoints
    target: ${spec}
    save: concrete
  - tool: swagger-endpoints
    target: ${spec}
    args: --fuzzable
    save: fuzzable

  - for_each: ${fuzzable}
    do:
      - tool: fuzz
        target: ${fuzzable.item}
        args: --timeout 120
        save: findings

  - for_each: ${concrete}
    do:
      - tool: nuclei
        target: ${concrete.item}
        args: --opt-args=-dast
        save: findings
      - tool: sqlmap
        target: ${concrete.item}
        save: findings
      - tool: zap-scan-url
        target: ${concrete.item}
        save: findings
