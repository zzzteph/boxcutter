name: swagger-fuzz
help: find OpenAPI/Swagger spec(s) on a host (or use a spec URL), then fuzz every parameterised endpoint (fuzz only - sibling of web-fuzz)
input: target
output: findings

steps:
  - tool: swagger-specs
    target: ${target}
    save: specs

  - for_each: ${specs}
    do:
      - tool: swagger-endpoints
        target: ${specs.item}
        args: --fuzzable
        save: fuzzable

  - for_each: ${fuzzable}
    do:
      - tool: fuzz
        target: ${fuzzable.item}
        args: --timeout 60
        save: findings
