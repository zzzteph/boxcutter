name: wayback-scan
help: wayback URLs - secrets on JS files, sqlmap/fuzz/zap on param URLs
input: target
output: findings

steps:
  - tool: wayback
    target: ${target}
    save: urls
  - select: ${urls | js}
    save: js
  - select: ${urls | params | dedup}
    save: params

  # secrets in each JS file
  - for_each: ${js}
    do:
      - tool: scan-secrets
        target: ${js.item}
        save: findings

  # DAST each parameterised URL (fuzz + nuclei -dast + sqlmap + zap-scan-url)
  - for_each: ${params}
    do:
      - workflow: web-dast
        target: ${params.item}
        save: findings
