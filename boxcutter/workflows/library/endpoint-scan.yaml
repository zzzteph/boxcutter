name: endpoint-scan
help: scan one endpoint with every DAST tool - fuzz + nuclei -dast + sqlmap + zap-scan-url
input: endpoint
output: findings

steps:
  - tool: fuzz
    target: ${endpoint}
    args: --timeout 120
    save: findings
  - tool: nuclei
    target: ${endpoint}
    args: --opt-args=-dast
    save: findings
  - tool: sqlmap
    target: ${endpoint}
    save: findings
  - tool: zap-scan-url
    target: ${endpoint}
    save: findings
