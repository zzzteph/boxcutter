name: web-scan
help: full DAST of one known URL (no httpx probe) - crawl -> zap-full -> fuzz/sqlmap per param URL -> swagger -> graphql detect+audit -> secrets per JS
input: url
output: findings

steps:
  # the given URL is the target as-is (no httpx liveness probe)
  - select: ${url}
    save: live

  - for_each: ${live}
    do:
      - workflow: url-crawl
        target: ${live.item}
        save: urls

  - for_each: ${urls | js}
    do:
      - tool: js-endpoints
        target: ${urls.item}
        pick: endpoints.url
        save: urls

  - select: ${urls | params | dedup}
    save: params

  # active-scan the URL itself (nuclei runs separately in full-scan)
  - for_each: ${live}
    do:
      - tool: zap-scan-full
        target: ${live.item}
        save: findings

  # scan each parameterised URL
  - for_each: ${params}
    do:
      - tool: fuzz
        target: ${params.item}
        args: --timeout 120
        save: findings
      - tool: sqlmap
        target: ${params.item}
        save: findings

  # discover OpenAPI/Swagger specs on the target, then scan every documented
  # endpoint (crawling alone never reaches an unlinked API)
  - for_each: ${live}
    do:
      - tool: swagger-specs
        target: ${live.item}
        save: specs
  - for_each: ${specs}
    do:
      - tool: swagger-endpoints
        target: ${specs.item}
        save: api_urls_concrete
      - tool: swagger-endpoints
        target: ${specs.item}
        args: --fuzzable
        save: api_urls
      - tool: zap-scan-openapi
        target: ${specs.item}
        save: findings
  # fuzz gets the {FUZZ}-marked variants (it substitutes the marker before sending);
  # sqlmap gets the concrete URLs - it has no concept of {FUZZ} and would otherwise
  # send the literal placeholder (e.g. /addresses/{FUZZ}, email=%7BFUZZ%7D) to the target
  - for_each: ${api_urls}
    do:
      - tool: fuzz
        target: ${api_urls.item}
        args: --timeout 120
        save: findings
  - for_each: ${api_urls_concrete}
    do:
      - tool: sqlmap
        target: ${api_urls_concrete.item}
        save: findings

  # discover GraphQL endpoint(s) on the target, then audit each (introspection,
  # CSRF, batching, arg injection, mutation exposure) - crawling rarely reaches them
  - for_each: ${live}
    do:
      - tool: graphql-detect
        target: ${live.item}
        save: gql
  - for_each: ${gql}
    do:
      - tool: graphql-audit
        target: ${gql.item}
        save: findings

  # secrets in each JS file
  - for_each: ${urls | js}
    do:
      - tool: scan-secrets
        target: ${urls.item}
        save: findings
