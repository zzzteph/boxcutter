name: web-scan
help: full DAST of one known URL (no httpx probe) - crawl -> zap-full -> web-dast per param URL -> swagger -> graphql-scan -> secrets per JS
input: url
output: findings

steps:
  # the given URL is the target as-is (no httpx liveness probe)
  - select: ${url}
    save: live

  - for_each: ${live}
    do:
      - workflow: web-crawl
        target: ${live.item}
        save: urls

  - for_each: ${urls | js}
    do:
      - tool: js-endpoints
        target: ${urls.item}
        pick: endpoints.url
        save: urls

  - select: ${urls | params | dedup}
    save: params

  # active-scan the URL itself (nuclei runs separately in web-full)
  - for_each: ${live}
    do:
      - tool: zap-scan-full
        target: ${live.item}
        save: findings

  # DAST each parameterised URL via web-dast (fuzz + nuclei-dast + sqlmap + zap-scan-url)
  - for_each: ${params}
    do:
      - workflow: web-dast
        target: ${params.item}
        save: findings

  # discover + DAST OpenAPI/Swagger endpoints - delegated to swagger-scan (find
  # specs on the host, then fuzz/nuclei-dast/sqlmap/zap per endpoint + zap-openapi)
  - workflow: swagger-scan
    target: ${url}
    save: findings

  # discover + audit GraphQL endpoint(s) - delegated to graphql-scan, which does
  # detect -> audit each (introspection, CSRF, batching, arg injection, mutation)
  - workflow: graphql-scan
    target: ${url}
    save: findings

  # secrets in each JS file
  - for_each: ${urls | js}
    do:
      - tool: scan-secrets
        target: ${urls.item}
        save: findings
