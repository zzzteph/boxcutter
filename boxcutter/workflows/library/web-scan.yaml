name: web-scan
help: full DAST of one known URL (no httpx probe) - crawl -> nuclei -> zap-full -> fuzz/sqlmap/nuclei-dast per param URL -> graphql detect+audit -> secrets per JS
input: url
output: findings

steps:
  # the given URL is the target as-is (no httpx liveness probe)
  - select: ${url}
    save: live

  - for_each: ${live}
    do:
      - tool: url-crawl
        target: ${live.item}
        save: urls

  - for_each: ${urls | js}
    do:
      - tool: js-endpoints
        target: ${urls.item}
        pick: endpoints.url
        save: urls

  - select: ${urls | params | dedup}
    save: params

  # scan the URL itself
  - for_each: ${live}
    do:
      - tool: nuclei
        target: ${live.item}
        args: '--opt-args="-tags exposures,misconfig,cve -severity critical,high,medium"'
        save: findings
      - tool: zap-scan-full
        target: ${live.item}
        save: findings

  # scan each parameterised URL
  - for_each: ${params}
    do:
      - tool: fuzz
        target: ${params.item}
        args: --timeout 120
        save: findings
      - tool: nuclei
        target: ${params.item}
        args: --opt-args=-dast
        save: findings
      - tool: sqlmap
        target: ${params.item}
        save: findings

  # discover OpenAPI/Swagger specs on the target, then scan every documented
  # endpoint (crawling alone never reaches an unlinked API)
  - for_each: ${live}
    do:
      - tool: swagger-specs
        target: ${live.item}
        save: specs
  - for_each: ${specs}
    do:
      - tool: swagger-endpoints
        target: ${specs.item}
        args: --fuzzable
        save: api_urls
      - tool: zap-scan-openapi
        target: ${specs.item}
        save: findings
  - for_each: ${api_urls}
    do:
      - tool: fuzz
        target: ${api_urls.item}
        args: --timeout 120
        save: findings
      - tool: sqlmap
        target: ${api_urls.item}
        save: findings

  # discover GraphQL endpoint(s) on the target, then audit each (introspection,
  # CSRF, batching, arg injection, mutation exposure) - crawling rarely reaches them
  - for_each: ${live}
    do:
      - tool: graphql-detect
        target: ${live.item}
        save: gql
  - for_each: ${gql}
    do:
      - tool: graphql-audit
        target: ${gql.item}
        save: findings

  # secrets in each JS file
  - for_each: ${urls | js}
    do:
      - tool: scan-secrets
        target: ${urls.item}
        save: findings
