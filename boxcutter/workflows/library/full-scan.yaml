name: full-scan
help: probe liveness (httpx), then nuclei template passes + the full web-scan DAST on each live URL
input: target
output: findings

steps:
  # liveness probe - the crawl/spec/param/secret DAST logic lives in web-scan
  # (single source of truth); nuclei template scanning runs first via nuclei-scan.
  - tool: httpx
    target: ${target}
    pick: url
    save: live

  - for_each: ${live}
    do:
      - workflow: nuclei-scan
        target: ${live.item}
        save: findings
      - workflow: web-scan
        target: ${live.item}
        save: findings
