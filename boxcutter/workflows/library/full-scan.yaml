name: full-scan
help: probe liveness (httpx), then run the full web-scan DAST on each live URL
input: target
output: findings

steps:
  # liveness probe - full-scan is just web-scan with an httpx front door, so the
  # crawl/spec/param/secret logic lives in web-scan (single source of truth).
  - tool: httpx
    target: ${target}
    pick: url
    save: live

  - for_each: ${live}
    do:
      - workflow: web-scan
        target: ${live.item}
        save: findings
