name: env-secrets
help: env-scan without the vuln scanners - validate subdomains, then crawl + secrets-scan each live host
input: target
output: findings

steps:
  - workflow: recon
    target: ${target}
    save: hosts

  - for_each: ${hosts}
    do:
      - tool: httpx
        target: ${hosts.item}
        pick: url
        save: live

  - for_each: ${live}
    do:
      - workflow: secrets-scan
        target: ${live.item}
        save: findings