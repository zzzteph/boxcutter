name: wayback-secrets-env
help: subfinder, then secrets-hunter (url-crawl + wayback -> scan-secrets) on every subdomain
input: target
output: findings

steps:
  - tool: subfinder
    target: ${target}
    save: hosts

  - for_each: ${hosts}
    do:
      - workflow: secrets-hunter
        target: ${hosts.item}
        save: findings