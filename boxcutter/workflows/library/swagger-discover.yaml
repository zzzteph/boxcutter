name: swagger-discover
help: find OpenAPI/Swagger specs on a host, then DAST every endpoint
input: target
output: findings

steps:
  - tool: swagger-specs
    target: ${target}
    save: specs

  - for_each: ${specs}
    do:
      - tool: swagger-endpoints
        target: ${specs.item}
        save: concrete

  - for_each: ${concrete}
    do:
      - tool: fuzz
        target: ${concrete.item}
        args: --timeout 60
        save: findings
      - tool: nuclei
        target: ${concrete.item}
        args: --opt-args=-dast
        save: findings
      - tool: sqlmap
        target: ${concrete.item}
        save: findings
      - tool: zap-scan-url
        target: ${concrete.item}
        save: findings
