name: env-nuclei
help: subfinder -> nuclei across the env (takeover on all hosts; web-nuclei template passes on live hosts)
input: target
output: findings

steps:
  - tool: subfinder
    target: ${target}
    save: hosts

  # Everything else only needs LIVE HTTP services - probe with httpx first.
  - for_each: ${hosts}
    do:
      - tool: httpx
        target: ${hosts.item}
        pick: url
        save: live

  - for_each: ${live}
    do:
      - workflow: web-nuclei
        target: ${live.item}
        save: findings
