name: env-scan
help: enumerate + validate subdomains, then web-full + wayback-scan each (web-full probes liveness itself)
input: target
output: findings

steps:
  - workflow: recon
    target: ${target}
    save: hosts

  # web-full probes liveness (httpx) itself and covers JS-secrets via web-scan, so
  # there is no separate pre-probe or secrets-scan pass here - one loop per host.
  - for_each: ${hosts}
    do:
      - workflow: web-full
        target: ${hosts.item}
        save: findings
      - workflow: wayback-scan
        target: ${hosts.item}
        save: findings
