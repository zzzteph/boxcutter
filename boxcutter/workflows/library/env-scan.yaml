name: env-scan
help: enumerate + validate subdomains, then full-scan + secrets-hunter + wayback-scan each
input: target
output: findings

steps:
  - workflow: recon
    target: ${target}
    save: hosts

  - for_each: ${hosts}
    do:
      - tool: httpx
        target: ${hosts.item}
        pick: url
        save: live

  # for each live URL: full vuln scan + secrets hunt
  - for_each: ${live}
    do:
      - workflow: full-scan
        target: ${live.item}
        save: findings
      - workflow: secrets-hunter
        target: ${live.item}
        save: findings

  # wayback scan each host
  - for_each: ${hosts}
    do:
      - workflow: wayback-scan
        target: ${hosts.item}
        save: findings
